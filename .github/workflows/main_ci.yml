on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Добавил для возможности ручного запуска кнопкой

jobs:
  test-and-log-check:
    runs-on: ubuntu-latest

    steps:
    - name: Копирование кода
      uses: actions/checkout@v3

    - name: Установка Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        # Если есть файл с библиотеками, раскомментируй строку ниже:
        # pip install -r requirements.txt 

    - name: Запуск тестов
      run: python test_logic.py

    - name: Проверка работы программы (Dry run)
      run: |
        # Эмулируем ввод числа 25 и запускаем программу
        echo "25" | python main.py 
        if [ -f app.log ]; then 
          echo "Лог-файл создан!"
        else 
          echo "Ошибка: Лог-файл app.log не найден"
          exit 1
        fi